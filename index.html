<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:;">
  <title>S&P 500 Widget</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="widget-container">
    <div id="loading" class="loading">
      <div class="loading-spinner"></div>
    </div>

    <div id="content" style="display: none;">
      <div class="header">
        <div class="header-left">
          <div class="logo">S&P</div>
          <div class="title">S&P 500</div>
        </div>
        <div class="header-right">
          <div id="statusDot" class="status-dot status-offline" title="Connecting..."></div>
          <div id="updateTime" class="update-time"></div>
          <div id="expandBtn" class="action-btn expand-btn" title="Expand portfolio">+</div>
          <div id="closeBtn" class="action-btn close-btn" title="Close widget">&times;</div>
        </div>
      </div>

      <div class="sp500-section">
        <div class="market-overview">
          <div class="sp500-data" id="sp500Data">
            <div class="sp500-label">S&P 500</div>
            <div id="currentPrice" class="current-price">0.00</div>
            <div id="dayChange" class="day-change"></div>
          </div>
          <div class="portfolio-summary" id="portfolioSummary">
            <div class="portfolio-label">Portfolio</div>
            <div id="portfolioTotal" class="portfolio-total">$0.00</div>
            <div id="portfolioPnL" class="portfolio-pnl">$0.00 (0.00%)</div>
          </div>
        </div>
      </div>

      <div id="marketStatus" class="market-status"></div>

      <div class="sparkline-container">
        <canvas id="sparklineCanvas" width="262" height="32"></canvas>
        <div id="sparklineToggle" class="sparkline-toggle">1D</div>
      </div>

      <div id="trendIndicators" class="trend-indicators" style="display: none;">
        <div id="trendWeek" class="trend-item">
          <div class="trend-label">Week</div>
          <div id="weekChange" class="trend-value"></div>
        </div>
        <div id="trendMonth" class="trend-item">
          <div class="trend-label">Month</div>
          <div id="monthChange" class="trend-value"></div>
        </div>
        <div id="trendYear" class="trend-item">
          <div class="trend-label">Year</div>
          <div id="yearChange" class="trend-value"></div>
        </div>
      </div>

      <div id="trendDetail" class="trend-detail"></div>

      <div id="portfolioSection" class="portfolio-section">
        <div class="portfolio-header">
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <div id="addStockBtn" class="add-stock-btn">+ Buy Stocks</div>
            <div id="reduceStockBtn" class="reduce-stock-btn">- Sell Stocks</div>
          </div>
        </div>

        <div id="stocksList" class="stocks-list"></div>

        <div id="addStockForm" class="add-stock-form"></div>

        <div id="reduceStockForm" class="reduce-stock-form">
          <div class="form-title">Reduce Stock Quantity</div>
          <div class="form-row">
            <div class="form-group" style="flex: 0 0 60px;">
              <div class="form-label">Symbol</div>
              <select id="reduceStockSymbol" class="form-input">
                <option value="">Select</option>
              </select>
            </div>
            <div class="form-group" style="flex: 0 0 70px;">
              <div class="form-label">Have</div>
              <input type="text" id="currentShares" class="form-input" readonly placeholder="0">
            </div>
            <div class="form-group" style="flex: 1;">
              <div class="form-label">Sell</div>
              <input type="number" id="sellShares" class="form-input" placeholder="0" min="0" step="0.01">
            </div>
          </div>
          <div class="form-row" style="margin-top: 4px;">
            <button id="reduceStockSubmit" class="form-btn">Sell</button>
            <button id="reduceStockCancel" class="form-btn cancel">Cancel</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
